<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GodbyDepo | Cloud Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080808;
            --panel-bg: #121212;
            --neon-pink: #ff00ff;
            --neon-red: #ff3131;
            --text-green: #00ff41;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-dark);
            color: white; font-family: 'Fira Code', monospace;
            overflow: hidden;
        }

        #main-app { display: flex; height: 100vh; flex-direction: column; }

        header {
            height: 60px; background: var(--panel-bg);
            display: flex; justify-content: space-between;
            align-items: center; padding: 0 20px;
            border-bottom: 1px solid var(--neon-pink);
        }

        .logo { font-size: 24px; font-weight: bold; color: var(--neon-pink); letter-spacing: 2px; }

        .nav-btns button {
            background: var(--neon-red); color: white; border: none;
            padding: 10px 20px; font-weight: bold; cursor: pointer;
            border-radius: 4px; transition: 0.3s;
        }
        .nav-btns button:hover { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }

        .content-wrapper { display: flex; flex: 1; overflow: hidden; }
        
        #editor-container { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; }

        textarea {
            flex: 1; background: #000; color: var(--text-green);
            padding: 20px; border: none; outline: none;
            font-size: 16px; resize: none; font-family: 'Fira Code', monospace;
        }

        #preview-container { flex: 1; background: white; }
        iframe { width: 100%; height: 100%; border: none; }

        /* MITO AI STYLES */
        #mito-bot {
            position: fixed; bottom: 20px; right: 20px;
            width: 60px; cursor: pointer; z-index: 100;
            transition: transform 0.3s;
        }
        #mito-bot:hover { transform: scale(1.1); }

        #mito-bubble {
            position: fixed; bottom: 90px; right: 20px;
            background: var(--panel-bg); border: 1px solid var(--neon-pink);
            padding: 15px; border-radius: 10px; width: 280px;
            display: none; box-shadow: 0 0 15px var(--neon-pink); z-index: 101;
        }

        .mito-btns button {
            display: block; width: 100%; margin: 5px 0; padding: 8px;
            background: #222; color: white; border: 1px solid #444;
            cursor: pointer; font-size: 11px; text-align: left;
        }
        .mito-btns button:hover { background: var(--neon-pink); }

        .lang-menu { display: none; margin-top: 10px; border-top: 1px dashed #555; padding-top: 10px; }
    </style>
</head>
<body>

    <div id="main-app">
        <header>
            <div class="logo" id="txt-logo">GODBY</div>
            <div class="nav-btns">
                <button onclick="deployCode()" id="txt-deploy">+ DEPLOY (CREATE)</button>
            </div>
        </header>

        <div class="content-wrapper">
            <div id="editor-container">
                <div id="txt-editor-label" style="background: #1a1a1a; padding: 5px 15px; font-size: 12px; color: #888;">EDITOR / index.html</div>
                <textarea id="code-editor" spellcheck="false" placeholder="Write your code..."></textarea>
            </div>
            <div id="preview-container">
                <div id="txt-preview-label" style="background: #eee; padding: 5px 15px; font-size: 12px; color: #333;">LIVE PREVIEW</div>
                <iframe id="live-view"></iframe>
            </div>
        </div>
    </div>

    <!-- MITO AI -->
    <div id="mito-bubble">
        <div id="mito-text">Merhaba kanka! Bugün ne yapmak istersin?</div>
        <div class="mito-btns">
            <button onclick="mitoFootball()" id="btn-game">Oynanabilir Futbol Yap</button>
            <button onclick="toggleLangMenu()" id="btn-lang">Dili Değiştir (Language)</button>
            <div id="lang-menu" class="lang-menu">
                <button onclick="changeLang('tr')">🇹🇷 Türkçe</button>
                <button onclick="changeLang('en')">🇺🇸 English</button>
                <button onclick="changeLang('ru')">🇷🇺 Русский</button>
            </div>
            <button onclick="toggleMito()" style="background:var(--neon-red)" id="btn-close">Kapat</button>
        </div>
    </div>
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" id="mito-bot" onclick="toggleMito()">

    <script>
        const editor = document.getElementById('code-editor');
        const preview = document.getElementById('live-view');

        // Dil Verileri
        const translations = {
            tr: {
                logo: "GODBY", deploy: "+ DEPLOY (OLUŞTUR)", editor: "EDİTÖR / index.html",
                preview: "CANLI ÖNİZLEME", welcome: "Merhaba kanka! Bugün ne yapmak istersin?",
                game: "Oynanabilir Futbol Yap", lang: "Dili Değiştir", close: "Kapat"
            },
            en: {
                logo: "GODBY", deploy: "+ DEPLOY (CREATE)", editor: "EDITOR / index.html",
                preview: "LIVE PREVIEW", welcome: "Hello buddy! What do you want to build?",
                game: "Make Playable Football", lang: "Change Language", close: "Close"
            },
            ru: {
                logo: "ГОДБИ", deploy: "+ РАЗВЕРНУТЬ", editor: "РЕДАКТОР / index.html",
                preview: "ПРЕДПРОСМОТР", welcome: "Привет, друг! Что будем создавать?",
                game: "Создать футбол", lang: "Изменить язык", close: "Закрыть"
            }
        };

        function changeLang(lang) {
            const t = translations[lang];
            document.getElementById('txt-logo').innerText = t.logo;
            document.getElementById('txt-deploy').innerText = t.deploy;
            document.getElementById('txt-editor-label').innerText = t.editor;
            document.getElementById('txt-preview-label').innerText = t.preview;
            document.getElementById('mito-text').innerText = t.welcome;
            document.getElementById('btn-game').innerText = t.game;
            document.getElementById('btn-lang').innerText = t.lang;
            document.getElementById('btn-close').innerText = t.close;
            document.getElementById('lang-menu').style.display = 'none';
        }

        function toggleLangMenu() {
            const menu = document.getElementById('lang-menu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        function toggleMito() {
            const bubble = document.getElementById('mito-bubble');
            bubble.style.display = (bubble.style.display === 'block') ? 'none' : 'block';
        }

        // Editör Çalıştırma
        editor.addEventListener('input', () => {
            const frameDoc = preview.contentWindow.document;
            frameDoc.open();
            frameDoc.write(editor.value);
            frameDoc.close();
        });

        function mitoFootball() {
            const footballCode = `
<!DOCTYPE html>
<html>
<body style="background: #228B22; margin: 0; overflow:hidden; font-family:sans-serif;">
    <div style="text-align:center; color:white; padding:10px;">WASD Tuşları ile Topu Sür!</div>
    <div id="ball" style="width: 40px; height: 40px; background: white; border: 2px solid black; border-radius: 50%; position: absolute; top: 50%; left: 50%; transition: 0.1s;"></div>
    <div style="position:absolute; right:0; top:40%; width:20px; height:100px; background:white; border-left:5px solid red;"></div>
    <script>
        let x = window.innerWidth / 2;
        let y = window.innerHeight / 2;
        const ball = document.getElementById('ball');
        window.addEventListener('keydown', (e) => {
            if(e.key === 'w') y -= 15;
            if(e.key === 's') y += 15;
            if(e.key === 'a') x -= 15;
            if(e.key === 'd') x += 15;
            ball.style.left = x + 'px';
            ball.style.top = y + 'px';
            if(x > window.innerWidth - 60) alert('GOOOOOL!');
        });
    <\/script>
</body>
</html>`;
            editor.value = footballCode.trim();
            editor.dispatchEvent(new Event('input'));
            toggleMito();
        }

        function deployCode() { alert("GodbyDepo: Proje buluta gönderildi!"); }
    </script>
</body>
</html>
