<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kullanıcı-Negan Service</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000000 url('https://i.imgur.com/b48ecd2156ffb634476f637ef87a477b.png') center center fixed;
            background-size: cover;
            color: #ffffff;
            font-family: 'Roboto Mono', monospace;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.88); }

        .terminal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 92%;
            max-width: 920px;
            background: rgba(8, 8, 8, 0.96);
            border: 1px solid #444;
            padding: 25px;
            z-index: 10;
        }

        .header { text-align: center; margin-bottom: 20px; }

        .logo {
            width: 130px;
            height: 130px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid #ffffff;
            margin-bottom: 10px;
        }

        .title { font-size: 1.6rem; }

        .input-line {
            display: flex;
            align-items: center;
            background: #0a0a0a;
            padding: 14px 18px;
            border: 1px solid #555;
            margin: 15px 0;
            font-size: 1.4rem;
        }

        .prompt { color: #ffffff; margin-right: 12px; user-select: none; }

        input {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: inherit;
            font-size: 1.4rem;
            flex: 1;
            outline: none;
        }

        .visualizer {
            display: flex;
            justify-content: center;
            gap: 6px;
            height: 70px;
            margin: 15px 0;
        }

        .bar {
            width: 11px;
            background: linear-gradient(#ffffff, #bbbbbb);
            transition: height 0.2s ease;
        }

        .output {
            margin-top: 10px;
            height: 360px;
            overflow-y: auto;
            line-height: 1.7;
            color: #eeeeee;
        }

        .loading-bar {
            height: 6px;
            background: #555;
            margin: 12px 0;
            position: relative;
            overflow: hidden;
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            height: 100%;
            width: 40%;
            background: #ffffff;
            animation: loading 1.5s linear infinite;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        .btn-clear {
            position: absolute;
            top: 25px;
            right: 25px;
            background: #333;
            color: #fff;
            border: 1px solid #666;
            padding: 8px 16px;
            font-size: 0.95rem;
            cursor: pointer;
            z-index: 20;
        }

        /* Numpad Stil */
        .numpad-btn {
            padding: 22px;
            font-size: 1.9rem;
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #666;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="terminal">
        <button class="btn-clear" onclick="clearScreen()">GERİ / TEMİZLE</button>

        <div class="header">
            <img src="https://cdn.phototourl.com/free/2026-05-10-05ed7890-1392-4605-9e29-13dc982a9898.jpg" alt="LOGO" class="logo">
            <div class="title">Kullanıcı-Negan Service</div>
        </div>

        <div class="visualizer" id="visualizer"></div>

        <div class="input-line">
            <span class="prompt">türeme@service →</span>
            <input type="text" id="command" autocomplete="off" autofocus>
        </div>

        <div class="output" id="output"></div>
    </div>

    <script>
        const visualizer = document.getElementById('visualizer');
        const input = document.getElementById('command');
        const output = document.getElementById('output');

        function createVisualizer() {
            visualizer.innerHTML = '';
            for (let i = 0; i < 24; i++) {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = '35%';
                visualizer.appendChild(bar);
            }
        }

        function reactToInput(text) {
            const bars = visualizer.children;
            for (let i = 0; i < bars.length; i++) {
                const height = 35 + Math.min(65, text.length * 6);
                bars[i].style.height = height + '%';
            }
        }

        function randomIP() {
            return `\( {Math.floor(Math.random()*255)}. \){Math.floor(Math.random()*255)}.\( {Math.floor(Math.random()*255)}. \){Math.floor(Math.random()*255)}`;
        }

        function addLine(text, color = '#eeeeee') {
            const line = document.createElement('div');
            line.style.color = color;
            line.textContent = text;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function showLoading(text) {
            const loadingHTML = `<div style="margin:12px 0;"><div>${text}</div><div class="loading-bar"></div></div>`;
            output.innerHTML += loadingHTML;
            output.scrollTop = output.scrollHeight;
        }

        window.clearScreen = function() {
            output.innerHTML = '';
            addLine('Ekran temizlendi.', '#aaaaaa');
        };

        // ====================== IP TARA ======================
        async function ipTara(ip) {
            showLoading('IP adresi sorgulanıyor...');
            try {
                const res = await fetch(`http://ip-api.com/json/${ip}?fields=status,message,country,city,regionName,isp,org`);
                const data = await res.json();
                if (data.status === "success") {
                    addLine(`IP: ${ip}`, '#ffffff');
                    addLine(`Ülke  : ${data.country || 'Bilinmiyor'}`, '#cccccc');
                    addLine(`Şehir  : ${data.city || 'Bilinmiyor'}`, '#cccccc');
                    addLine(`Bölge  : ${data.regionName || 'Bilinmiyor'}`, '#cccccc');
                    addLine(`ISP    : ${data.isp || 'Bilinmiyor'}`, '#cccccc');
                } else {
                    addLine('IP sorgulanamadı.', '#ff6666');
                }
            } catch (e) {
                addLine(`IP: ${ip} → Türkiye / Ankara (Simülasyon)`, '#ffffff');
            }
        }

        // ====================== NUMPAD ======================
        function showNumpad() {
            const numpadHTML = `
                <div style="background:#111; padding:25px; text-align:center; margin:20px 0; border:1px solid #555;">
                    <h3 style="margin-bottom:15px; color:#fff;">EDEX NUMPAD v1.16</h3>
                    <div id="entered" style="font-size:2.2rem; background:#000; padding:15px; margin:15px 0; min-height:60px; border:1px solid #666; text-align:left; letter-spacing:2px;"></div>
                    
                    <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; max-width:360px; margin:20px auto;">
                        <button class="numpad-btn" onclick="addNumber('1')">1</button>
                        <button class="numpad-btn" onclick="addNumber('2')">2</button>
                        <button class="numpad-btn" onclick="addNumber('3')">3</button>
                        <button class="numpad-btn" onclick="addNumber('4')">4</button>
                        <button class="numpad-btn" onclick="addNumber('5')">5</button>
                        <button class="numpad-btn" onclick="addNumber('6')">6</button>
                        <button class="numpad-btn" onclick="addNumber('7')">7</button>
                        <button class="numpad-btn" onclick="addNumber('8')">8</button>
                        <button class="numpad-btn" onclick="addNumber('9')">9</button>
                        <button class="numpad-btn" onclick="addNumber('*')">*</button>
                        <button class="numpad-btn" onclick="addNumber('0')">0</button>
                        <button class="numpad-btn" onclick="addNumber('#')">#</button>
                    </div>
                    <button onclick="clearNumpad()" style="padding:10px 30px; background:#333; color:white; border:none; margin-top:10px;">TEMİZLE</button>
                </div>`;

            output.innerHTML += numpadHTML;
            output.scrollTop = output.scrollHeight;
        }

        window.addNumber = function(num) {
            const entered = document.getElementById('entered');
            if (entered) entered.textContent += num;
        };

        window.clearNumpad = function() {
            const entered = document.getElementById('entered');
            if (entered) entered.textContent = '';
        };

        // ====================== KOMUT İŞLEME ======================
        input.addEventListener('input', () => reactToInput(input.value));

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const cmd = input.value.trim();
                if (!cmd) return;

                addLine(`türeme@service → ${cmd}`);

                if (cmd === '<key: NGN-E54D-389F>') {
                    showLoading('Anahtar doğrulanıyor...');
                    setTimeout(() => addLine('KEY DOĞRULANDI → Servis aktif', '#ffffff'), 1100);
                } 
                else if (cmd.toLowerCase() === 'edex1.16') {
                    showLoading('EDEX arayüzü yükleniyor...');
                    setTimeout(showNumpad, 1200);
                } 
                else if (cmd === '/info.dataservice') {
                    showLoading('Veri servisi aktif ediliyor...');
                    setTimeout(() => {
                        let count = 0;
                        const interval = setInterval(() => {
                            if (count < 20) addLine(`→ ${randomIP()}   ACTIVE`, '#cccccc'), count++;
                            else clearInterval(interval);
                        }, 100);
                    }, 900);
                } 
                else if (cmd === '/.help') {
                    addLine('Kullanılabilir Komutlar:', '#ffffff');
                    addLine('   <key: NGN-E54D-389F>   → Servis başlat', '#ffffff');
                    addLine('   edex1.16               → Tuş takımı', '#ffffff');
                    addLine('   /info.dataservice      → Rastgele IP', '#ffffff');
                    addLine('   /.iptara [IP]          → IP sorgula', '#ffffff');
                    addLine('   /.clear                → Ekranı temizle', '#ffffff');
                } 
                else if (cmd === '/.clear') {
                    clearScreen();
                } 
                else if (cmd.startsWith('/.iptara ')) {
                    const ip = cmd.split(' ')[1];
                    if (ip) ipTara(ip);
                    else addLine('Kullanım: /.iptara 8.8.8.8', '#ff6666');
                } 
                else {
                    addLine('Bilinmeyen komut → Komut listesi: /.help', '#aaaaaa');
                }

                input.value = '';
                reactToInput('');
            }
        });

        window.onload = () => {
            createVisualizer();
            addLine('Kullanıcı-Negan Service başlatıldı.');
            addLine('Komutları görmek için: /.help', '#aaaaaa');
        };
    </script>
</body>
</html>
