<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDOS ATACK</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      overflow-x: hidden;
    }
    .header {
      background: #000;
      padding: 15px;
      text-align: center;
      border-bottom: 2px solid #ff0000;
    }
    .logo {
      width: 260px;
      filter: drop-shadow(0 0 20px #ff0000);
      image-rendering: crisp-edges;
    }
    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
    }
    .login-box, .main-page {
      background: #111111;
      border: 1px solid #333;
      padding: 30px;
      border-radius: 8px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #1a1a1a;
      border: 1px solid #444;
      color: #e0e0e0;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #1f1f1f;
      border: 1px solid #666;
      color: #e0e0e0;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #ff0000;
      color: white;
      border-color: #ff0000;
    }
    .ifsa-btn {
      background: #8B0000;
      color: white;
      font-size: 18px;
      padding: 15px;
      margin: 20px 0;
      border: 2px solid #ff0000;
    }
    .ifsa-btn:hover {
      background: #ff0000;
      box-shadow: 0 0 25px #ff0000;
    }
    .feed {
      margin-top: 20px;
    }
    .post {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }
    .post img, .post video {
      max-width: 100%;
      margin-top: 10px;
      border: 1px solid #444;
      border-radius: 6px;
    }
    .status {
      color: #aaa;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <!-- LOGIN SAYFASI -->
  <div id="loginPage">
    <div class="header">
      <img src="https://cdn.phototourl.com/free/2026-05-10-8f64af96-f57f-47dd-b0ff-b9a16f16cc45.jpg" 
           alt="DDOS ATACK" class="logo" 
           onerror="this.src='https://via.placeholder.com/260x260/111111/ffffff?text=DDOS+ATACK'">
      <h1 style="color:#ff0000; margin-top:10px;">DDOS ATACK</h1>
    </div>
    <div class="container">
      <div class="login-box">
        <h2 style="text-align:center; margin-bottom:20px; color:#ff0000;">🔓 KAYIT OL / GİRİŞ YAP</h2>
        <input type="email" id="email" placeholder="E-posta adresi" required>
        <input type="password" id="password" placeholder="Şifre" required>
        <button onclick="register()">KAYIT OL VE GİRİŞ YAP</button>
        <p class="status">Herkes girebilir • Veriler kalıcıdır • Yenilense bile gitmez</p>
      </div>
    </div>
  </div>

  <!-- ANA SAYFA -->
  <div id="mainPage" style="display:none;">
    <div class="header">
      <img src="https://cdn.phototourl.com/free/2026-05-10-8f64af96-f57f-47dd-b0ff-b9a16f16cc45.jpg" 
           alt="DDOS ATACK" class="logo" 
           onerror="this.src='https://via.placeholder.com/260x260/111111/ffffff?text=DDOS+ATACK'">
      <h1 style="color:#ff0000;">DDOS ATACK</h1>
    </div>

    <div class="container">
      <button class="ifsa-btn" onclick="ifsaModu()">🚨 İFŞA ET (Tam Erişim)</button>

      <div class="login-box">
        <h3>Yeni İfşa / Paylaşım</h3>
        <textarea id="postText" rows="4" placeholder="Ne ifşa etmek istiyorsun?"></textarea>
        
        <input type="file" id="fileInput" accept="image/*,video/*,.gif" style="margin:10px 0;">
        
        <button onclick="postShare()">PAYLAŞ</button>
      </div>

      <div class="feed" id="feed">
        <!-- Paylaşımlar buraya gelir -->
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;

    function register() {
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value.trim();

      if (!email || !pass) {
        alert("E-posta ve şifre giriniz!");
        return;
      }

      currentUser = { email: email, name: email.split('@')[0] };
      localStorage.setItem('ddosUser', JSON.stringify(currentUser));
      
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('mainPage').style.display = 'block';
      loadPosts();
    }

    function loadPosts() {
      const feed = document.getElementById('feed');
      const posts = JSON.parse(localStorage.getItem('ddosPosts')) || [];
      feed.innerHTML = '';

      posts.reverse().forEach(post => {
        const div = document.createElement('div');
        div.className = 'post';
        div.innerHTML = `
          <strong style="color:#ff6666;">${post.user}</strong> 
          <small style="color:#666;">${post.time}</small>
          <p>${post.text}</p>
          \( {post.file ? `<img src=" \){post.file}" alt="yuklenen">` : ''}
        `;
        feed.appendChild(div);
      });
    }

    function postShare() {
      const text = document.getElementById('postText').value.trim();
      const fileInput = document.getElementById('fileInput');
      
      if (!text && !fileInput.files.length) {
        alert("Mesaj yaz veya dosya yükle!");
        return;
      }

      const posts = JSON.parse(localStorage.getItem('ddosPosts')) || [];
      let fileURL = '';
      
      if (fileInput.files.length > 0) {
        fileURL = URL.createObjectURL(fileInput.files[0]);
      }

      posts.push({
        user: currentUser.name,
        text: text || "Dosya yüklendi...",
        file: fileURL,
        time: new Date().toLocaleString('tr-TR')
      });

      localStorage.setItem('ddosPosts', JSON.stringify(posts));
      document.getElementById('postText').value = '';
      document.getElementById('fileInput').value = '';
      loadPosts();
    }

    function ifsaModu() {
      alert("🚨 İFŞA MODU AKTİF!\n\nArtık her şeye tam erişimin var.\nMesajlar ve dosyalar kalıcı olarak saklanıyor.");
    }

    window.onload = () => {
      const savedUser = localStorage.getItem('ddosUser');
      if (savedUser) {
        currentUser = JSON.parse(savedUser);
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainPage').style.display = 'block';
        loadPosts();
      }
    };
  </script>
</body>
</html>
